dataset_args:
  ceval:
    aggregation: mean
    data_statistics: null
    dataset_id: evalscope/ceval
    default_subset: default
    description: '

      ## Overview


      C-Eval is a comprehensive Chinese evaluation benchmark designed to assess the
      knowledge and reasoning abilities of language models in Chinese. It covers 52
      subjects ranging from STEM to humanities and social sciences, with questions
      from middle school to professional examination levels.


      ## Task Description


      - **Task Type**: Multiple-Choice Question Answering (Chinese)

      - **Input**: Chinese question with four answer choices (A, B, C, D)

      - **Output**: Single correct answer letter

      - **Subjects**: 52 subjects organized into 4 categories (STEM, Social Science,
      Humanities, Other)


      ## Key Features


      - 13,948 multiple-choice questions across 52 subjects

      - Questions sourced from Chinese middle school, high school, college, and professional
      exams

      - Covers diverse domains including mathematics, physics, law, medicine, and
      more

      - Includes explanations for validation split questions

      - Standard benchmark for Chinese language model evaluation


      ## Evaluation Notes


      - Default configuration uses **5-shot** examples from the dev split

      - Questions and prompts are in Chinese

      - Answers should follow the format: "答案：[LETTER]"

      - Results can be aggregated by subject or category

      - Use `subset_list` parameter to evaluate specific subjects

      '
    eval_split: val
    extra_params: {}
    few_shot_num: 5
    few_shot_prompt_template: '以下是一些示例问题：


      {fewshot}


      '
    few_shot_random: false
    filters: null
    force_redownload: false
    metric_list:
