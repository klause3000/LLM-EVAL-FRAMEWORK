dataset_args:
  humaneval:
    aggregation: mean_and_pass_at_k
    data_statistics: null
    dataset_id: opencompass/humaneval
    default_subset: default
    description: '

      ## Overview


      HumanEval is a benchmark for evaluating the code generation capabilities of
      language models. It consists of 164 hand-written Python programming problems
      with function signatures, docstrings, and comprehensive test cases.


      ## Task Description


      - **Task Type**: Code Generation (Python)

      - **Input**: Function signature with docstring describing the expected behavior

      - **Output**: Complete Python function implementation

      - **Languages**: Python only


      ## Key Features


      - 164 hand-crafted programming problems

      - Each problem includes a function signature, docstring, and test cases

      - Problems range from simple string manipulation to complex algorithms

      - Canonical solutions provided for reference

      - Automatic correctness verification through test execution


      ## Evaluation Notes


      - **Security Warning**: By default, code is executed in the local environment.
      We strongly recommend using sandbox execution for safety. See the [sandbox documentation](https://evalscope.readthedocs.io/en/latest/user_guides/sandbox.html)
      for details.

      - Supports `pass@k` metric calculation for measuring generation quality

      - Default timeout is 4 seconds per problem

      - Code is extracted from markdown code blocks if present

      '
    eval_split: test
    extra_params: {}
    few_shot_num: 0
    few_shot_prompt_template: null
    few_shot_random: false
    filters: null
    force_redownload: false
