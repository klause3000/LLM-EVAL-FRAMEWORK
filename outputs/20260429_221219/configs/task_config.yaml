analysis_report: false
api_url: http://localhost:11434/v1
chat_template: null
dataset_args:
  mbpp:
    aggregation: mean_and_pass_at_k
    data_statistics: null
    dataset_id: google-research-datasets/mbpp
    default_subset: default
    description: '

      ## Overview


      MBPP (Mostly Basic Python Problems) is a benchmark consisting of approximately
      1,000 crowd-sourced Python programming problems designed for entry-level programmers.
      It evaluates a model''s ability to understand problem descriptions and generate
      correct Python code.


      ## Task Description


      - **Task Type**: Code Generation (Python)

      - **Input**: Natural language task description with test cases

      - **Output**: Python function implementation

      - **Difficulty**: Entry-level programming problems


      ## Key Features


      - ~1,000 crowd-sourced programming problems

      - Covers programming fundamentals and standard library usage

      - Each problem includes task description, solution, and 3 test cases

      - Problems are designed to be solvable by entry-level programmers

      - Automatic evaluation through test case execution


      ## Evaluation Notes


      - Default configuration uses **3-shot** examples

      - **Security Warning**: Sandbox environment is required for safe code execution.
      See the [sandbox documentation](https://evalscope.readthedocs.io/en/latest/user_guides/sandbox.html)
      for details.

      - Supports `pass@k` metric calculation

      - Default timeout is 20 seconds per problem

      - Code is extracted from `[BEGIN]...[DONE]` blocks if present

      '
    eval_split: test
    extra_params: {}
    few_shot_num: 3
    few_shot_prompt_template: "You are an expert Python programmer, and here is your\
      \ task: Write a function to find the similar elements from the given two tuple\
      \ lists. Your code should pass these tests:\n\nassert similar_elements((3, 4,\
      \ 5, 6),(5, 7, 4, 10)) == (4, 5)\nassert similar_elements((1, 2, 3, 4),(5, 4,\
      \ 3, 7)) == (3, 4)\nassert similar_elements((11, 12, 14, 13),(17, 15, 14, 13))\
      \ == (13, 14)\n[BEGIN]\ndef similar_elements(test_tup1, test_tup2):\r\n  res\
      \ = tuple(set(test_tup1) & set(test_tup2))\r\n  return (res)\n[DONE]\nYou are\
      \ an expert Python programmer, and here is your task: Write a python function\
      \ to identify non-prime numbers. Your code should pass these tests:\n\nassert\
      \ is_not_prime(2) == False\nassert is_not_prime(10) == True\nassert is_not_prime(35)\
      \ == True\n[BEGIN]\nimport math\r\ndef is_not_prime(n):\r\n    result = False\r\
      \n    for i in range(2,int(math.sqrt(n)) + 1):\r\n        if n % i == 0:\r\n\
      \            result = True\r\n    return result\n[DONE]\nYou are an expert Python\
      \ programmer, and here is your task: Write a function to find the largest integers\
      \ from a given list of numbers using heap queue algorithm. Your code should\
      \ pass these tests:\n\nassert heap_queue_largest( [25, 35, 22, 85, 14, 65, 75,\
      \ 22, 58],3)==[85, 75, 65]\nassert heap_queue_largest( [25, 35, 22, 85, 14,\
      \ 65, 75, 22, 58],2)==[85, 75]\nassert heap_queue_largest( [25, 35, 22, 85,\
      \ 14, 65, 75, 22, 58],5)==[85, 75, 65, 58, 35]\n[BEGIN]\nimport heapq as hq\r\
      \ndef heap_queue_largest(nums,n):\r\n  largest_nums = hq.nlargest(n, nums)\r\
      \n  return largest_nums\n[DONE]\nYou are an expert Python programmer, and here\
      \ is your task: {question} Your code should pass these tests:\n\n{tests}\n[BEGIN]\n"
    few_shot_random: false
    filters: null
    force_redownload: false
    metric_list:
    - acc
    name: mbpp
    output_types:
    - generation
    paper_url: null
    pretty_name: MBPP
    prompt_template: 'You are an expert Python programmer, and here is your task:
      {question} Your code should pass these tests:


      {tests}'
    query_template: null
    review_timeout: 20
    sample_example: null
    sandbox_config:
      image: python:3.11-slim
      tools_config:
        python_executor: {}
        shell_executor: {}
    shuffle: false
    shuffle_choices: false
    subset_list:
    - full
    system_prompt: null
    tags:
    - Coding
    train_split: prompt
