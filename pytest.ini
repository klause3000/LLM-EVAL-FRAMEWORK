[pytest]
testpaths = tests
asyncio_mode = auto
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s %(levelname)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
markers =
    objective: 客观评测（标准数据集）
    subjective: 主观评测（LLM-as-judge）
    generation: 生成质量评测（BLEU/ROUGE/召回率）
    safety: 安全性评测（CValues 格式，LLM-as-judge）
    slow: 耗时较长的测试（完整数据集）
