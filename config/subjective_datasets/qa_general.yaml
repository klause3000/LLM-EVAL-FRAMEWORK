  - id: "gen_006"
    question: "TCP 和 UDP 的核心区别是什么？分别适合哪些场景？"
    reference_answer: "TCP 是面向连接、可靠传输、有序到达，适合文件传输、HTTP 等需要可靠性的场景；UDP 是无连接、低延迟，适合视频直播、游戏、DNS 等对实时性要求高的场景。"
    tags: ["计算机网络", "概念理解"]

  - id: "gen_007"
    question: "解释 Python 中 GIL（全局解释器锁）的作用及其对多线程性能的影响。"
    reference_answer: "GIL 是 CPython 的互斥锁，同一时刻只允许一个线程执行 Python 字节码。对 CPU 密集型任务多线程无法充分利用多核，应改用多进程；对 I/O 密集型任务影响较小。"
    tags: ["Python", "并发"]

  - id: "gen_008"
    question: "什么是数据库事务的 ACID 特性？请分别解释每个字母的含义。"
    reference_answer: "ACID：原子性（Atomicity，事务要么全部成功要么全部回滚）、一致性（Consistency，事务前后数据保持一致状态）、隔离性（Isolation，并发事务互不干扰）、持久性（Durability，提交后数据永久保存）。"
    tags: ["数据库", "概念理解"]

  - id: "gen_009"
    question: "请用通俗语言解释梯度下降算法，不需要写公式。"
    reference_answer: "梯度下降就像在山上蒙着眼睛找最低点，每次感受脚下的坡度，沿着最陡的下坡方向迈一小步，不断重复直到到达山谷（损失最小值）。"
    tags: ["机器学习", "概念理解"]

  - id: "gen_010"
    question: "REST API 和 GraphQL 的主要区别是什么？各自的优缺点是什么？"
    reference_answer: "REST 按资源设计多个端点，简单直观，缓存友好，但可能过度获取或不足获取数据；GraphQL 单一端点，客户端精确指定所需字段，灵活性高，但查询复杂，缓存较难实现。"
    tags: ["API设计", "后端"]

