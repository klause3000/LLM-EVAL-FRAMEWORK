  - id: "gen_013"
    question: "解释什么是 CAP 定理，并举例说明如何在分布式系统中做出权衡。"
    reference_answer: "CAP 定理指分布式系统无法同时保证一致性（Consistency）、可用性（Availability）和分区容错性（Partition tolerance）三者，最多只能满足其二。例如 ZooKeeper 优先保证 CP（牺牲部分可用性），Cassandra 优先保证 AP（牺牲强一致性）。"
    tags: ["分布式系统", "概念理解"]

  - id: "gen_014"
    question: "用一段话解释'奥卡姆剃刀'原则，并给出一个日常生活中的应用例子。"
    reference_answer: "奥卡姆剃刀原则是：如无必要，勿增实体——在多种解释中优先选择假设最少、最简单的那个。例如汽车无法启动时，先检查油量不足或电池亏电，而不是直接假设发动机损坏。"
    tags: ["哲学思维", "日常应用"]

  - id: "gen_015"
    question: "请比较 Docker 容器与虚拟机（VM）的区别，列出各自的适用场景。"
    reference_answer: "Docker 容器共享宿主机内核，启动快、资源占用少，适合微服务、CI/CD 和快速部署；VM 有独立操作系统，隔离性更强，适合需要运行不同操作系统或强安全隔离的场景。"
    tags: ["DevOps", "容器化"]

  - id: "gen_016"
    question: "解释 JavaScript 中 Promise 和 async/await 的关系，以及它们如何解决回调地狱问题。"
    reference_answer: "Promise 是异步操作的封装对象，通过链式 .then() 替代嵌套回调；async/await 是 Promise 的语法糖，让异步代码看起来像同步代码，大幅提升可读性，两者本质上都是对事件循环的调度封装。"
    tags: ["JavaScript", "异步编程"]

  - id: "gen_017"
    question: "什么是向量数据库？它与传统关系型数据库有什么本质区别？"
    reference_answer: "向量数据库专门存储和检索高维向量（如文本嵌入、图像特征），通过近似最近邻（ANN）算法进行语义相似度搜索；关系型数据库存储结构化数据，通过精确匹配（SQL）查询，两者在存储结构、查询方式和应用场景上完全不同。"
    tags: ["数据库", "AI基础设施"]

  - id: "gen_018"
    question: "请说明在代码 review 中应该重点关注哪些方面，列出你认为最重要的五点。"
    reference_answer: "代码 review 重点：1）正确性（逻辑是否符合需求、边界条件处理）；2）安全性（输入校验、SQL 注入、权限控制）；3）可读性（命名、注释、函数长度）；4）性能（N+1 查询、不必要的循环、内存泄漏）；5）可测试性（函数是否单一职责、是否便于单元测试）。"
    tags: ["工程实践", "代码质量"]

  - id: "gen_019"
    question: "解释 Transformer 架构中 Attention 机制的核心思想，用尽量通俗的语言。"
    reference_answer: "Attention 机制让模型在处理每个词时，能动态关注句子中其他所有词的相关程度——就像翻译一句话时，翻译某个词时大脑会重点参考原文中与之最相关的几个词，而非平等对待所有词。"
    tags: ["深度学习", "NLP"]

