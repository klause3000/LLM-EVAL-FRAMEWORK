    question: "请用简洁的语言解释什么是大语言模型（LLM），并举一个实际应用场景。"
    reference_answer: "大语言模型是基于海量文本数据训练的深度神经网络，能理解和生成自然语言。实际应用如智能客服、代码补全等。"
